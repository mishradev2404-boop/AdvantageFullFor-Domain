<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdVantage Media | Specialist LinkedIn Advertising Agency</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NNK8S5N276"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NNK8S5N276');
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- All styles in one place — edit css/styles.css, never inline -->
    <link rel="stylesheet" href="css/styles.css">

<body>

    <!--
    ================================================================
      PAGE SHELLS
      Each <div id="page-*"> is a full-page container.
      Only one is visible at a time (class "active" toggled by app.js).
      The inner content of each page lives in pages/*.html and is
      loaded once on DOMContentLoaded by app.js.
    ================================================================
    -->

    <div id="page-home"      class="page"></div>
    <div id="page-services"  class="page"></div>
    <div id="page-contact"   class="page"></div>
    <div id="page-story"     class="page"></div>
    <div id="page-resources" class="page"></div>

    <!--
    ================================================================
      APP SCRIPT
      Handles: page routing, form submissions, playbook gates.
      Edit js/app.js — do not add inline scripts here.
    ================================================================
    -->
    <script src="js/app.js"></script>
</body>
</html>
